<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Date</title>

<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --pink: #ff5f7f;
  --pink-dark: #f34f72;
  --pink-light: #fff0f4;
  --pink-border: #ff6b89;
  --text: #2b2b2b;
  --gray: #969696;
  --light-gray: #f7f7f7;
  --border: #ededed;
}

body {
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    "Noto Sans KR",
    sans-serif;

  background: #fff7f9;
  color: var(--text);
}

button,
input,
textarea,
select {
  font: inherit;
}

button {
  cursor: pointer;
}

button:disabled {
  cursor: default;
  opacity: 0.55;
}

.app {
  max-width: 600px;
  min-height: 100vh;

  margin: 0 auto;

  background: #fff;
}

.screen {
  display: none;
  min-height: 100vh;
}

.screen.active {
  display: block;
}


/* ========================================
   TOP BAR
======================================== */

.topbar {
  position: sticky;
  top: 0;

  z-index: 30;

  height: 64px;

  display: flex;
  align-items: center;

  padding: 0 18px;

  background: rgba(255,255,255,0.96);

  backdrop-filter: blur(12px);

  border-bottom: 1px solid #f3f3f3;
}

.topbar-title {
  flex: 1;

  text-align: center;

  font-size: 18px;
  font-weight: 700;
}

.back-button {
  width: 40px;
  height: 40px;

  border: none;

  background: transparent;

  color: #333;

  font-size: 28px;
}

.topbar-space {
  width: 40px;
}


/* ========================================
   CALENDAR HEADER
======================================== */

.calendar-header-main {
  padding: 34px 20px 24px;
}

.calendar-header-main h1 {
  margin-bottom: 6px;

  font-size: 28px;
  font-weight: 800;
}

.calendar-header-main p {
  color: #999;

  font-size: 14px;
}


/* ========================================
   MONTH
======================================== */

.month-controller {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 20px;

  margin-bottom: 22px;
}

.month-controller button {
  width: 42px;
  height: 42px;

  display: flex;
  align-items: center;
  justify-content: center;

  border: none;
  border-radius: 50%;

  background: var(--pink-light);

  color: var(--pink);

  font-size: 25px;
}

#monthTitle {
  font-size: 20px;
  font-weight: 750;
}


/* ========================================
   CALENDAR
======================================== */

.calendar-wrapper {
  padding: 0 16px 40px;
}

.weekdays {
  display: grid;

  grid-template-columns: repeat(7, 1fr);

  margin-bottom: 10px;

  text-align: center;

  color: #999;

  font-size: 13px;
}

.weekdays div {
  padding: 8px 0;
}

.weekdays div:first-child {
  color: var(--pink);
}

.weekdays div:last-child {
  color: #527cf5;
}

.calendar {
  display: grid;

  grid-template-columns: repeat(7, 1fr);

  gap: 7px;
}

.calendar-day,
.calendar-empty {
  aspect-ratio: 1;
}

.calendar-day {
  position: relative;

  display: flex;
  align-items: center;
  justify-content: center;

  border: 2px solid transparent;
  border-radius: 17px;

  background: transparent;

  font-size: 14px;

  transition: 0.15s;
}

.calendar-day:hover {
  background: #fff7f9;
}

.calendar-day:active {
  transform: scale(0.96);
}

.calendar-day.today {
  background: #fff3f6;

  font-weight: 700;
}

.calendar-day.has-time {
  border: 2px solid var(--pink-border);

  background: #fffafd;

  font-weight: 700;
}

.calendar-day.today.has-time {
  background: var(--pink-light);
}

.calendar-day.has-content:not(.has-time)::after {
  content: "♥";

  position: absolute;

  bottom: 4px;
  left: 50%;

  transform: translateX(-50%);

  color: var(--pink);

  font-size: 8px;
}


/* ========================================
   DATE DETAIL
======================================== */

.detail-content {
  padding: 24px 18px 55px;
}

.date-heading {
  margin-bottom: 30px;
}

.date-heading h2 {
  margin-bottom: 6px;

  font-size: 25px;
}

.date-heading p {
  color: #999;

  font-size: 14px;
}

.block {
  margin-bottom: 32px;
}

.block-title {
  margin-bottom: 12px;

  color: #777;

  font-size: 14px;
  font-weight: 600;
}


/* ========================================
   TIME
======================================== */

.date-time-wrapper {
  display: grid;

  grid-template-columns:
    minmax(0,1fr)
    30px
    minmax(0,1fr);

  align-items: end;

  gap: 8px;
}

.time-selector {
  min-width: 0;
}

.time-label {
  margin-bottom: 8px;

  color: #aaa;

  font-size: 12px;
  font-weight: 600;
}

.custom-time-button {
  width: 100%;
  min-height: 68px;

  display: flex;
  align-items: center;

  gap: 10px;

  padding: 0 14px;

  border: 1.5px solid #eee;
  border-radius: 18px;

  background: #fafafa;

  text-align: left;

  transition: 0.15s;
}

.custom-time-button:hover {
  border-color: #ffc2cf;

  background: #fffafb;
}

.custom-time-button.has-value {
  border-color: #ffadc0;

  background: #fff7f9;
}

.time-icon {
  width: 35px;
  height: 35px;

  flex-shrink: 0;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 11px;

  background: var(--pink-light);

  color: var(--pink);

  font-size: 18px;
}

.time-button-text {
  min-width: 0;

  overflow: hidden;

  white-space: nowrap;

  text-overflow: ellipsis;

  color: #999;

  font-size: 15px;
}

.custom-time-button.has-value
.time-button-text {
  color: #252525;

  font-weight: 700;
}

.time-divider {
  height: 68px;

  display: flex;
  align-items: center;
  justify-content: center;

  color: #bbb;

  font-size: 18px;
}


/* ========================================
   INPUT
======================================== */

input[type="text"],
textarea {
  width: 100%;

  padding: 13px 14px;

  border: 1px solid var(--border);
  border-radius: 15px;

  background: #fafafa;

  outline: none;

  transition: 0.15s;
}

input[type="text"]:focus,
textarea:focus {
  border-color: #ffadc0;

  background: white;
}

textarea {
  min-height: 95px;

  resize: vertical;

  line-height: 1.6;
}


/* ========================================
   CATEGORY
======================================== */

.category-list {
  display: flex;
  flex-direction: column;

  gap: 11px;
}

.category-card {
  width: 100%;

  display: flex;
  align-items: center;

  padding: 16px;

  border: 1px solid #ededed;
  border-radius: 18px;

  background: white;

  text-align: left;

  transition: 0.15s;
}

.category-card:hover {
  border-color: #ffc6d2;

  background: #fffafb;
}

.category-icon {
  width: 47px;
  height: 47px;

  flex-shrink: 0;

  display: flex;
  align-items: center;
  justify-content: center;

  margin-right: 13px;

  border-radius: 14px;

  background: var(--pink-light);

  font-size: 23px;
}

.category-info {
  flex: 1;
}

.category-info strong {
  display: block;

  margin-bottom: 3px;

  font-size: 16px;
}

.category-info span {
  color: #999;

  font-size: 13px;
}

.category-arrow {
  color: #bbb;

  font-size: 23px;
}


/* ========================================
   SAVE
======================================== */

.save-button {
  width: 100%;

  padding: 15px;

  border: none;
  border-radius: 15px;

  background: var(--pink);

  color: white;

  font-size: 15px;
  font-weight: 750;
}

.save-button:hover {
  background: var(--pink-dark);
}


/* ========================================
   CATEGORY SCREEN
======================================== */

.category-content {
  padding: 20px 18px 105px;
}

.empty-state {
  padding: 75px 20px;

  text-align: center;

  color: #aaa;
}

.empty-state .emoji {
  margin-bottom: 12px;

  font-size: 45px;
}


/* ========================================
   PLACE
======================================== */

.place-card {
  overflow: hidden;

  margin-bottom: 15px;

  border: 1px solid #ededed;
  border-radius: 19px;

  background: white;
}

.place-image {
  height: 175px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: #f6f6f6;

  color: #aaa;
}

.place-image img {
  width: 100%;
  height: 100%;

  object-fit: cover;
}

.place-body {
  padding: 16px;
}

.place-title-row {
  display: flex;
  align-items: center;

  gap: 10px;
}

.place-title {
  flex: 1;

  font-size: 18px;
  font-weight: 750;
}

.delete-button {
  width: 35px;
  height: 35px;

  border: none;
  border-radius: 10px;

  background: #fff0f1;

  color: #ff5757;

  font-size: 18px;
}

.place-address {
  margin-top: 6px;

  color: #888;

  font-size: 13px;
}

.place-memo {
  margin-top: 11px;

  color: #444;

  font-size: 14px;
  line-height: 1.55;

  white-space: pre-wrap;
}

.edit-button {
  margin-top: 13px;

  padding: 9px 14px;

  border: none;
  border-radius: 10px;

  background: var(--pink-light);

  color: var(--pink);

  font-weight: 650;
}


/* ========================================
   FLOAT ADD
======================================== */

.floating-add {
  position: fixed;

  bottom: 20px;
  left: 50%;

  z-index: 20;

  width: calc(100% - 36px);
  max-width: 564px;

  transform: translateX(-50%);

  padding: 16px;

  border: none;
  border-radius: 17px;

  background: var(--pink);

  color: white;

  font-weight: 750;

  box-shadow:
    0 7px 25px
    rgba(255,95,127,0.28);
}



/* ========================================
   KAKAO PLACE SEARCH
======================================== */

.place-search-box {
  margin-bottom: 22px;
  padding: 16px;
  border: 1px solid #ffe0e7;
  border-radius: 18px;
  background: #fffafb;
}

.place-search-title {
  margin-bottom: 9px;
  color: #555;
  font-size: 13px;
  font-weight: 700;
}

.place-search-row {
  display: flex;
  gap: 8px;
}

.place-search-row input {
  flex: 1;
  min-width: 0;
}

.place-search-button {
  flex-shrink: 0;
  padding: 0 16px;
  border: none;
  border-radius: 14px;
  background: var(--pink);
  color: white;
  font-size: 14px;
  font-weight: 750;
}

.place-search-help {
  margin-top: 8px;
  color: #aaa;
  font-size: 11px;
  line-height: 1.5;
}

.place-search-results {
  display: none;
  max-height: 290px;
  overflow-y: auto;
  margin-top: 12px;
  border: 1px solid #ededed;
  border-radius: 15px;
  background: white;
}

.place-search-results.active {
  display: block;
}

.place-search-result {
  width: 100%;
  display: block;
  padding: 13px 14px;
  border: none;
  border-bottom: 1px solid #f2f2f2;
  background: white;
  text-align: left;
}

.place-search-result:last-child {
  border-bottom: none;
}

.place-search-result:hover {
  background: #fff7f9;
}

.place-search-result-name {
  margin-bottom: 4px;
  color: #333;
  font-size: 14px;
  font-weight: 750;
}

.place-search-result-address {
  color: #777;
  font-size: 12px;
  line-height: 1.45;
}

.place-search-result-category {
  margin-top: 4px;
  color: #aaa;
  font-size: 11px;
}

.place-search-message {
  padding: 20px 14px;
  text-align: center;
  color: #999;
  font-size: 13px;
}

.place-selected-box {
  display: none;
  margin-top: 12px;
  padding: 12px 13px;
  border: 1px solid #ffb7c7;
  border-radius: 14px;
  background: #fff5f8;
}

.place-selected-box.active {
  display: block;
}

.place-selected-label {
  margin-bottom: 4px;
  color: var(--pink);
  font-size: 11px;
  font-weight: 750;
}

.place-selected-name {
  color: #333;
  font-size: 13px;
  font-weight: 750;
}

.place-selected-address {
  margin-top: 3px;
  color: #777;
  font-size: 11px;
  line-height: 1.45;
}


/* ========================================
   MODAL
======================================== */

.modal-background {
  position: fixed;

  inset: 0;

  z-index: 100;

  display: none;

  align-items: flex-end;
  justify-content: center;

  background: rgba(0,0,0,0.35);
}

.modal-background.active {
  display: flex;
}

.modal {
  width: 100%;
  max-width: 600px;

  max-height: 92vh;

  overflow-y: auto;

  padding: 24px 20px 28px;

  border-radius: 25px 25px 0 0;

  background: white;
}

.modal h3 {
  margin-bottom: 24px;

  font-size: 23px;
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;

  margin-bottom: 8px;

  color: #777;

  font-size: 13px;
  font-weight: 600;
}


/* ========================================
   PHOTO
======================================== */

.hidden-file-input {
  display: none;
}

.photo-upload-box {
  width: 100%;
  min-height: 145px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  gap: 8px;

  padding: 20px;

  border: 1.5px dashed #ffafc0;
  border-radius: 18px;

  background: #fff9fb;

  text-align: center;

  transition: 0.15s;
}

.photo-upload-box:hover {
  border-color: var(--pink);

  background: #fff4f7;
}

.upload-icon {
  width: 48px;
  height: 48px;

  display: flex;
  align-items: center;
  justify-content: center;

  margin-bottom: 3px;

  border-radius: 15px;

  background: var(--pink-light);

  color: var(--pink);

  font-size: 23px;
}

.upload-title {
  color: #444;

  font-size: 15px;
  font-weight: 700;
}

.upload-description {
  color: #aaa;

  font-size: 12px;
}

.upload-button-look {
  margin-top: 5px;

  padding: 9px 18px;

  border-radius: 11px;

  background: var(--pink);

  color: white;

  font-size: 13px;
  font-weight: 700;
}

.image-preview-wrapper {
  position: relative;

  display: none;

  margin-top: 12px;
}

.image-preview-wrapper.active {
  display: block;
}

.image-preview {
  display: block;

  width: 100%;
  max-height: 260px;

  border-radius: 16px;

  object-fit: cover;
}

.change-photo-button {
  position: absolute;

  right: 10px;
  bottom: 10px;

  padding: 8px 12px;

  border: none;
  border-radius: 10px;

  background: rgba(255,255,255,0.92);

  color: #444;

  font-size: 12px;
  font-weight: 700;

  box-shadow:
    0 3px 12px
    rgba(0,0,0,0.12);
}


/* ========================================
   MODAL BUTTONS
======================================== */

.modal-buttons {
  display: flex;

  gap: 10px;

  margin-top: 24px;
}

.modal-buttons button {
  flex: 1;

  padding: 14px;

  border: none;
  border-radius: 14px;

  font-weight: 750;
}

.cancel {
  background: #f2f2f2;

  color: #555;
}

.confirm {
  background: var(--pink);

  color: white;
}


/* ========================================
   TIME MODAL
======================================== */

.time-modal-background {
  position: fixed;

  inset: 0;

  z-index: 200;

  display: none;

  align-items: flex-end;
  justify-content: center;

  background: rgba(0,0,0,0.32);
}

.time-modal-background.active {
  display: flex;
}

.time-modal {
  width: 100%;
  max-width: 600px;

  padding:
    22px
    20px
    calc(26px + env(safe-area-inset-bottom));

  border-radius: 26px 26px 0 0;

  background: white;
}

.time-modal-title {
  margin-bottom: 21px;

  font-size: 20px;
  font-weight: 750;
}

.time-select-row {
  display: grid;

  grid-template-columns:
    0.9fr
    1fr
    24px
    1fr;

  align-items: center;

  gap: 8px;
}

.pretty-select select {
  width: 100%;
  height: 58px;

  padding: 0 14px;

  border: 1.5px solid #eee;
  border-radius: 15px;

  background: #fafafa;

  color: #222;

  outline: none;

  text-align: center;

  font-weight: 700;

  appearance: none;
  -webkit-appearance: none;
}

.pretty-select select:focus {
  border-color: #ffa8bb;

  background: #fff8fa;
}

.time-colon {
  text-align: center;

  font-size: 23px;
  font-weight: 700;
}

.time-modal-actions {
  display: flex;

  gap: 10px;

  margin-top: 22px;
}

.time-modal-actions button {
  flex: 1;

  height: 51px;

  border: none;
  border-radius: 14px;

  font-weight: 750;
}

.time-clear-button {
  background: #f3f3f3;

  color: #555;
}

.time-confirm-button {
  background: var(--pink);

  color: white;
}


/* ========================================
   LOADING
======================================== */

.loading-overlay {
  position: fixed;

  inset: 0;

  z-index: 9999;

  display: none;

  align-items: center;
  justify-content: center;

  background: rgba(255,255,255,0.72);

  backdrop-filter: blur(3px);
}

.loading-overlay.active {
  display: flex;
}

.loading-box {
  padding: 18px 25px;

  border-radius: 18px;

  background: white;

  box-shadow:
    0 8px 30px
    rgba(0,0,0,0.1);

  color: #555;

  font-size: 14px;
  font-weight: 650;
}


/* ========================================
   SUCCESS POPUP
======================================== */

.success-overlay {
  position: fixed;

  inset: 0;

  z-index: 10000;

  display: none;

  align-items: center;
  justify-content: center;

  padding: 22px;

  background: rgba(25,20,22,0.34);

  backdrop-filter: blur(5px);
}

.success-overlay.active {
  display: flex;
}

.success-card {
  width: min(350px,100%);

  padding: 30px 24px 22px;

  border-radius: 28px;

  background: white;

  text-align: center;

  box-shadow:
    0 24px 70px
    rgba(0,0,0,0.18);

  animation:
    popupOpen 0.22s ease-out;
}

.success-icon {
  width: 66px;
  height: 66px;

  display: flex;
  align-items: center;
  justify-content: center;

  margin: 0 auto 18px;

  border-radius: 50%;

  background: #ffe8ee;

  color: var(--pink);

  font-size: 31px;
  font-weight: 800;
}

.success-title {
  margin-bottom: 8px;

  font-size: 21px;
  font-weight: 800;
}

.success-message {
  margin-bottom: 23px;

  color: #777;

  font-size: 14px;
  line-height: 1.6;
}

.success-confirm {
  width: 100%;

  padding: 14px;

  border: none;
  border-radius: 14px;

  background: var(--pink);

  color: white;

  font-size: 15px;
  font-weight: 750;
}


/* ========================================
   DELETE POPUP
======================================== */

.delete-overlay {
  position: fixed;

  inset: 0;

  z-index: 10001;

  display: none;

  align-items: center;
  justify-content: center;

  padding: 22px;

  background: rgba(25,20,22,0.34);

  backdrop-filter: blur(5px);
}

.delete-overlay.active {
  display: flex;
}

.delete-card {
  width: min(350px,100%);

  padding: 30px 24px 22px;

  border-radius: 28px;

  background: white;

  text-align: center;

  box-shadow:
    0 24px 70px
    rgba(0,0,0,0.18);

  animation:
    popupOpen 0.22s ease-out;
}

.delete-icon {
  width: 66px;
  height: 66px;

  display: flex;
  align-items: center;
  justify-content: center;

  margin: 0 auto 18px;

  border-radius: 50%;

  background: #fff0f2;

  color: var(--pink);

  font-size: 29px;
  font-weight: 800;
}

.delete-title {
  margin-bottom: 8px;

  font-size: 21px;
  font-weight: 800;
}

.delete-message {
  margin-bottom: 23px;

  color: #777;

  font-size: 14px;
}

.delete-actions {
  display: flex;

  gap: 10px;
}

.delete-actions button {
  flex: 1;

  padding: 14px;

  border: none;
  border-radius: 14px;

  font-size: 15px;
  font-weight: 750;
}

.delete-cancel {
  background: #f2f2f2;

  color: #555;
}

.delete-confirm {
  background: var(--pink);

  color: white;
}

@keyframes popupOpen {

  from {
    opacity: 0;

    transform:
      translateY(10px)
      scale(0.93);
  }

  to {
    opacity: 1;

    transform:
      translateY(0)
      scale(1);
  }

}


/* ========================================
   DESKTOP
======================================== */

@media (min-width: 600px) {

  body {
    padding: 20px 0;
  }

  .app {
    min-height: calc(100vh - 40px);

    overflow: hidden;

    border-radius: 26px;

    box-shadow:
      0 8px 40px
      rgba(0,0,0,0.06);
  }

}

<script>

/* =====================================================
   SUPABASE
===================================================== */

const SUPABASE_URL =
  "https://epfpbagzqldyirlphlcs.supabase.co";

const SUPABASE_KEY =
  "sb_publishable_SWdzCt8VX_4PZX0RzTpvSg_mmGL78bv";


const db =

  );


/* =====================================================

let viewingMonth =

viewingMonth =

  );

   SUCCESS POPUP

/* =====================================================
   EMPTY DATE
===================================================== */

function createEmptyDate() {

  return {

    id: null,

    date:
      selectedDate,

    startTime: "",

    endTime: "",

    memo: "",

    places: {

      restaurant: [],

      cafe: [],

      activity: []

    }

  };

}


/* =====================================================
   TIME NORMALIZE
===================================================== */

function normalizeTime(
  time
) {

  if (!time) {
    return "";
  }


  return String(time)
    .slice(
      0,
      5
    );

}


/* =====================================================
   SERVER DATA LOAD
===================================================== */

async function loadServerData() {

  /*
    1. 날짜 데이터
  */

  const {
    data: dates,
    error: datesError
  } =
    await db
      .from(
        "dates"
      )
      .select("*");


  if (datesError) {
    throw datesError;
  }


  /*
    2. 장소 데이터
  */

  const {
    data: places,
    error: placesError
  } =
    await db
      .from(
        "places"
      )
      .select("*")
      .order(
        "created_at",
        {
          ascending: true
        }
      );


  if (placesError) {
    throw placesError;
  }


  /*
    3. 이미지 데이터
  */

  const {
    data: images,
    error: imagesError
  } =
    await db
      .from(
        "place_images"
      )
      .select("*");


  if (imagesError) {
    throw imagesError;
  }


  const newData = {};


  /*
    날짜 데이터 변환
  */

  for (
    const row of dates || []
  ) {

    newData[
      row.date
    ] = {

      id:
        row.id,

      date:
        row.date,

      startTime:
        normalizeTime(
          row.start_time
        ),

      endTime:
        normalizeTime(
          row.end_time
        ),

      memo:
        row.memo || "",

      places: {

        restaurant: [],

        cafe: [],

        activity: []

      }

    };

  }


  /*
    이미지들을 장소 ID 기준으로 정리
  */

  const imageByPlace = {};


  for (
    const image of images || []
  ) {

    if (
      !imageByPlace[
        image.place_id
      ]
    ) {

      imageByPlace[
        image.place_id
      ] = [];

    }


    const {
      data: publicUrlData
    } =
      db
        .storage
        .from(
          "place-images"
        )
        .getPublicUrl(
          image.storage_path
        );


    imageByPlace[
      image.place_id
    ]
    .push({

      id:
        image.id,

      storagePath:
        image.storage_path,

      url:
        publicUrlData.publicUrl

    });

  }


  /*
    date_id → 날짜
  */

  const dateIdMap = {};


  for (
    const dateKey of
    Object.keys(newData)
  ) {

    dateIdMap[
      newData[
        dateKey
      ].id
    ] =
      dateKey;

  }


  /*
    장소를 날짜에 연결
  */

  for (
    const place of places || []
  ) {

    const dateKey =
      dateIdMap[
        place.date_id
      ];


    if (!dateKey) {
      continue;
    }


    if (
      !newData[
        dateKey
      ]
      .places[
        place.category
      ]
    ) {

      continue;

    }


    const placeImages =
      imageByPlace[
        place.id
      ]
      ||
      [];


    newData[
      dateKey
    ]
    .places[
      place.category
    ]
    .push({

      id:
        place.id,

      name:
        place.name,

      address:
        place.address || "",

      memo:
        place.memo || "",

      latitude:
        place.latitude,

      longitude:
        place.longitude,

      images:
        placeImages,

      image:
        placeImages.length > 0
        ?
        placeImages[0].url
        :
        null

    });

  }


  /*
    가장 중요:
    서버의 최신 데이터로
    브라우저 캐시 전체 교체
  */

  appData =
    newData;

}


/* =====================================================
   REFRESH FROM SERVER

   ★ 화면 전환 때마다 이 함수를 호출
===================================================== */

async function refreshFromServer(
  loadingText = "최신 정보 불러오는 중..."
) {

  showLoading(
    loadingText
  );


  try {

    await loadServerData();


    return true;

  } catch (error) {

    console.error(
      "서버 동기화 실패:",
      error
    );


    alert(
      "최신 정보를 불러오지 못했어.\n"
      +
      error.message
    );


    return false;

  } finally {

    hideLoading();

  }

}


/* =====================================================
   GET DATE DATA
===================================================== */

function getDateData() {

  return (

    appData[
      selectedDate
    ]

    ||

    createEmptyDate()

  );

}


/* =====================================================
   SCREEN
===================================================== */

function showScreen(

) {

  document

/* =====================================================
   GO CALENDAR

   ★ 저장 후 서버 최신 데이터 재조회
===================================================== */

async function goCalendar() {

  try {

    await saveDateInfo(

    );

/* =====================================================
   GO DATE SCREEN

   ★ 카테고리 → 날짜 화면 갈 때 서버 재조회
===================================================== */

async function goDateScreen() {

/* =====================================================
   DATE KEY
===================================================== */

function createDateKey(
  year,
  month,
  day
) {

  return (
    year
    +
    "-"
    +
    String(
      month + 1
    )
    .padStart(
      2,
      "0"
    )
    +
    "-"
    +
    String(
      day
    )
    .padStart(
      2,
      "0"
    )
  );

}


/* =====================================================
   CALENDAR
===================================================== */

function renderCalendar() {

  const calendar =
    document
      .getElementById(
        "calendar"
      );


  calendar.innerHTML =
    "";


  const year =
    viewingMonth
      .getFullYear();


  const month =
    viewingMonth
      .getMonth();


  document
    .getElementById(
      "monthTitle"
    )
    .textContent =
    `${year}년 ${month + 1}월`;


  const firstDay =
    new Date(
      year,
      month,
      1
    )
    .getDay();


  const lastDay =
    new Date(
      year,
      month + 1,
      0
    )
    .getDate();


  for (
    let i = 0;
    i < firstDay;
    i++
  ) {

    const empty =
      document
        .createElement(
          "div"
        );


    empty.className =
      "calendar-empty";


    calendar.appendChild(
      empty
    );

  }


  const today =
    new Date();


  for (
    let day = 1;
    day <= lastDay;
    day++
  ) {

    const key =
      createDateKey(
        year,
        month,
        day
      );


    const data =
      appData[
        key
      ];


    const button =
      document
        .createElement(
          "button"
        );


    button.type =
      "button";


    button.className =
      "calendar-day";


    button.textContent =
      day;


    if (
      today.getFullYear() === year
      &&
      today.getMonth() === month
      &&
      today.getDate() === day
    ) {

      button
        .classList
        .add(
          "today"
        );

    }


    if (
      hasDateContent(
        data
      )
    ) {

      button
        .classList
        .add(
          "has-content"
        );

    }


    if (
      hasDateTime(
        data
      )
    ) {

      button
        .classList
        .add(
          "has-time"
        );

    }


    button.onclick =
      function() {

        openDate(
          year,
          month,
          day
        );

      };


    calendar.appendChild(
      button
    );

  }

}


function hasDateTime(
  data
) {

  if (!data) {
    return false;
  }


  return Boolean(
    data.startTime
    &&
    data.endTime
  );

}


function hasDateContent(
  data
) {

  if (!data) {
    return false;
  }


  if (
    data.startTime
    ||
    data.endTime
    ||
    data.memo
  ) {

    return true;

  }


  return (

    (
      data.places
        ?.restaurant
        ?.length
      ||
      0
    )

    +

    (
      data.places
        ?.cafe
        ?.length
      ||
      0
    )

    +

    (
      data.places
        ?.activity
        ?.length
      ||
      0
    )

  ) > 0;

}

/* =====================================================
   SAVE DATE
===================================================== */

async function saveDateInfo(
  showMessage = true
) {

  if (!selectedDate) {
    return;
  }


  const startTime =
    document
      .getElementById(
        "startTime"
      )
      .value;


  const endTime =
    document
      .getElementById(
        "endTime"
      )
      .value;


  const memo =
    document
      .getElementById(
        "dateMemo"
      )
      .value
      .trim();


  const existing =
    appData[
      selectedDate
    ];


  const placeCount =
    existing
    ?
    (
      existing.places.restaurant.length
      +
      existing.places.cafe.length
      +
      existing.places.activity.length
    )
    :
    0;


  /*
    모든 정보가 지워졌고
    장소도 없으면 날짜 행 삭제
  */

  if (
    !startTime
    &&
    !endTime
    &&
    !memo
    &&
    placeCount === 0
  ) {

    if (
      existing?.id
    ) {

      const {
        error
      } =
        await db
          .from(
            "dates"
          )
          .delete()
          .eq(
            "id",
            existing.id
          );


      if (error) {
        throw error;
      }

    }


    /*
      서버에서 다시 받아서
      진짜 삭제됐는지 반영
    */

    await loadServerData();


    renderCalendar();


    if (
      showMessage
    ) {

      showSuccessModal(
        "저장 완료!",
        "데이트 정보가 저장됐어 ♡"
      );

    }


    return;

  }


  if (
    showMessage
  ) {

    showLoading(
      "데이트 저장 중..."
    );

  }


  try {

    const {
      error
    } =
      await db
        .from(
          "dates"
        )
        .upsert(
          {

            date:
              selectedDate,

            start_time:
              startTime
              ||
              null,

            end_time:
              endTime
              ||
              null,

            memo:
              memo
              ||
              null,

            updated_at:
              new Date()
                .toISOString()

          },
          {

            onConflict:
              "date"

          }
        );


    if (error) {
      throw error;
    }


    /*
      ★ 저장 직후에도 서버에서 다시 읽음
    */

    await loadServerData();


    renderCalendar();


    if (
      showMessage
    ) {

      showSuccessModal(
        "저장 완료!",
        "데이트 정보가 저장됐어 ♡"
      );

    }


  } catch (error) {

    console.error(
      error
    );


    if (
      showMessage
    ) {

      alert(
        "데이트 저장 실패\n"
        +
        error.message
      );

    }


    throw error;


  } finally {

    if (
      showMessage
    ) {

      hideLoading();

    }

  }

}

  } =

      )

function updateSingleTimeDisplay(
  inputId
) {

  const value =
    document
      .getElementById(
        inputId
      )
      .value;


  const displayId =
    inputId === "startTime"
    ?
    "startTimeDisplay"
    :
    "endTimeDisplay";


  const buttonId =
    inputId === "startTime"
    ?
    "startTimeButton"
    :
    "endTimeButton";


  const display =
    document
      .getElementById(
        displayId
      );


  const button =
    document
      .getElementById(
        buttonId
      );


  if (!value) {

    display.textContent =
      "시간 선택";


    button
      .classList
      .remove(
        "has-value"
      );


    return;

  }


  display.textContent =
    convertToPrettyTime(
      value
    );


  button
    .classList
    .add(
      "has-value"
    );

}


function convertToPrettyTime(
  time
) {

  const [
    hourText,
    minute
  ] =
    time.split(":");


  let hour =
    Number(
      hourText
    );


  const period =
    hour >= 12
    ?
    "오후"
    :
    "오전";


  hour =
    hour % 12;


  if (
    hour === 0
  ) {

    hour = 12;

  }


  return (
    `${period} `
    +
    `${hour}:`
    +
    `${minute}`
  );

}

function openTimePicker(
  target
) {

  currentTimeTarget =
    target;


  const existingTime =
    document
      .getElementById(
        target
      )
      .value;


  let hour24;
  let minute;


  if (
    existingTime
  ) {

    [
      hour24,
      minute
    ] =
      existingTime
        .split(":")
        .map(Number);

  } else {

    const now =
      new Date();


    hour24 =
      now.getHours();


    minute =
      now.getMinutes();

  }


  const period =
    hour24 >= 12
    ?
    "PM"
    :
    "AM";


  let hour12 =
    hour24 % 12;


  if (
    hour12 === 0
  ) {

    hour12 = 12;

  }


  document
    .getElementById(
      "timePeriod"
    )
    .value =
    period;


  document
    .getElementById(
      "timeHour"
    )
    .value =
    hour12;


  document
    .getElementById(
      "timeMinute"
    )
    .value =
    minute;


  document
    .getElementById(
      "timePickerModal"
    )
    .classList
    .add(
      "active"
    );

}


function confirmSelectedTime() {

  if (
    !currentTimeTarget
  ) {

    return;

  }


  const period =
    document
      .getElementById(
        "timePeriod"
      )
      .value;


  let hour =
    Number(
      document
        .getElementById(
          "timeHour"
        )
        .value
    );


  const minute =
    Number(
      document
        .getElementById(
          "timeMinute"
        )
        .value
    );


  if (
    period === "AM"
    &&
    hour === 12
  ) {

    hour = 0;

  }


  if (
    period === "PM"
    &&
    hour !== 12
  ) {

    hour += 12;

  }


  const value =
    String(hour)
      .padStart(
        2,
        "0"
      )
    +
    ":"
    +
    String(minute)
      .padStart(
        2,
        "0"
      );


  document
    .getElementById(
      currentTimeTarget
    )
    .value =
    value;


  closeTimePicker();

  updateTimeDisplays();

}


function clearSelectedTime() {

  if (
    !currentTimeTarget
  ) {

    return;

  }


  document
    .getElementById(
      currentTimeTarget
    )
    .value =
    "";


  closeTimePicker();

  updateTimeDisplays();

}

  document

    .classList

    );


  currentTimeTarget =
    null;

}

function searchKakaoPlaces() {

  const keyword =
    document
      .getElementById(
        "kakaoPlaceKeyword"
      )
      .value
      .trim();


  if (!keyword) {

    showKakaoSearchMessage(
      "검색할 장소 이름을 입력해줘."
    );

    return;

  }


  if (
    typeof kakao ===
    "undefined"
    ||
    !kakao.maps
    ||
    !kakao.maps.services
  ) {

    showKakaoSearchMessage(
      "카카오 장소 검색을 불러오지 못했어. 카카오맵 설정을 확인해줘."
    );

    return;

  }


  showKakaoSearchMessage(
    "검색 중..."
  );


  const placeService =
    new kakao.maps.services.Places();


  placeService
    .keywordSearch(
      keyword,
      function(
        data,
        status
      ) {

        if (
          status ===
          kakao.maps.services.Status.OK
        ) {

          kakaoPlaceResults =
            data || [];


          renderKakaoPlaceResults();

          return;

        }


        kakaoPlaceResults =
          [];


        if (
          status ===
          kakao.maps.services.Status.ZERO_RESULT
        ) {

          showKakaoSearchMessage(
            "검색 결과가 없어."
          );

          return;

        }


        showKakaoSearchMessage(
          "장소 검색 중 오류가 발생했어."
        );

      },
      {
        size:
          15
      }
    );

}

function previewPlaceImage(
  event
) {

  const file =
    event.target
      .files[0];


  if (!file) {
    return;
  }


  if (
    !file.type
      .startsWith(
        "image/"
      )
  ) {

    alert(
      "이미지 파일만 선택할 수 있어."
    );


    event.target.value =
      "";


    return;

  }


  temporaryImageFile =
    file;


  revokeTemporaryPreview();


  temporaryPreviewUrl =
    URL.createObjectURL(
      file
    );


  showPhotoPreview(
    temporaryPreviewUrl
  );

}


function revokeTemporaryPreview() {

  if (
    temporaryPreviewUrl
  ) {

    URL.revokeObjectURL(
      temporaryPreviewUrl
    );


    temporaryPreviewUrl =
      null;

  }

}

/* =====================================================
   STORAGE PATH
===================================================== */

function makeStoragePath(
  placeId,
  file
) {

  let extension =
    file.name
      .split(".")
      .pop()
      ?.toLowerCase();


  if (
    !extension
    ||
    extension.length > 10
  ) {

    extension =
      "jpg";

  }


  const uniqueId =
    (
      typeof crypto !==
      "undefined"
      &&
      crypto.randomUUID
    )
    ?
    crypto.randomUUID()
    :
    (
      Date.now()
      +
      "-"
      +
      Math.random()
        .toString(36)
        .slice(2)
    );


  return (
    `places/${placeId}/`
    +
    `${uniqueId}.${extension}`
  );

}


/* =====================================================
   IMAGE UPLOAD
===================================================== */

async function uploadPlaceImage(
  placeId,
  file
) {

  const storagePath =
    makeStoragePath(
      placeId,
      file
    );


  const {
    error: uploadError
  } =
    await db
      .storage
      .from(
        "place-images"
      )
      .upload(
        storagePath,
        file,
        {

          cacheControl:
            "3600",

          upsert:
            false

        }
      );


  if (
    uploadError
  ) {

    throw uploadError;

  }


  const {
    data: imageRow,
    error: imageDbError
  } =
    await db
      .from(
        "place_images"
      )
      .insert({

        place_id:
          placeId,

        storage_path:
          storagePath

      })
      .select()
      .single();


  if (
    imageDbError
  ) {

    await db
      .storage
      .from(
        "place-images"
      )
      .remove([
        storagePath
      ]);


    throw imageDbError;

  }


  const {
    data: publicUrlData
  } =
    db
      .storage
      .from(
        "place-images"
      )
      .getPublicUrl(
        storagePath
      );


  return {

    id:
      imageRow.id,

    storagePath:
      storagePath,

    url:
      publicUrlData.publicUrl

  };

}


/* =====================================================
   DELETE IMAGE
===================================================== */

async function deleteImageObject(
  image
) {

  if (!image) {
    return;
  }


  const {
    error: storageError
  } =
    await db
      .storage
      .from(
        "place-images"
      )
      .remove([
        image.storagePath
      ]);


  if (
    storageError
  ) {

    console.warn(
      "Storage 이미지 삭제 실패:",
      storageError
    );

  }


  const {
    error: dbError
  } =
    await db
      .from(
        "place_images"
      )
      .delete()
      .eq(
        "id",
        image.id
      );


  if (
    dbError
  ) {

    console.warn(
      "이미지 DB 삭제 실패:",
      dbError
    );

  }

}


/* =====================================================
   SAVE PLACE
===================================================== */

async function savePlace() {

  const name =
    document
      .getElementById(
        "placeName"
      )
      .value
      .trim();


  if (!name) {

    alert(
      "장소 이름은 입력해줘!"
    );

    return;

  }


  const address =
    document
      .getElementById(
        "placeAddress"
      )
      .value
      .trim();


  const latitudeText =
    document
      .getElementById(
        "placeLatitude"
      )
      .value
      .trim();


  const longitudeText =
    document
      .getElementById(
        "placeLongitude"
      )
      .value
      .trim();


  const latitude =
    latitudeText
    ?
    Number(
      latitudeText
    )
    :
    null;


  const longitude =
    longitudeText
    ?
    Number(
      longitudeText
    )
    :
    null;


  const memo =
    document
      .getElementById(
        "placeMemo"
      )
      .value
      .trim();


  const saveButton =
    document
      .getElementById(
        "savePlaceButton"
      );


  saveButton.disabled =
    true;


  showLoading(
    "후보 저장 중..."
  );


  try {

    const dateId =
      await ensureDateRow();


    let placeRow;


    /*
      새 장소
    */

    if (
      editingPlaceIndex ===
      null
    ) {

      const {
        data,
        error
      } =
        await db
          .from(
            "places"
          )
          .insert({

            date_id:
              dateId,

            category:
              currentCategory,

            name:
              name,

            address:
              address || null,

            memo:
              memo || null,

            latitude:
              Number.isFinite(
                latitude
              )
              ?
              latitude
              :
              null,

            longitude:
              Number.isFinite(
                longitude
              )
              ?
              longitude
              :
              null

          })
          .select()
          .single();


      if (
        error
      ) {

        throw error;

      }


      placeRow =
        data;

    }

    /*
      기존 장소 수정
    */

    else {

      const oldPlace =
        getDateData()
          .places[
            currentCategory
          ][
            editingPlaceIndex
          ];


      const {
        data,
        error
      } =
        await db
          .from(
            "places"
          )
          .update({

            name:
              name,

            address:
              address || null,

            memo:
              memo || null,

            latitude:
              Number.isFinite(
                latitude
              )
              ?
              latitude
              :
              null,

            longitude:
              Number.isFinite(
                longitude
              )
              ?
              longitude
              :
              null

          })
          .eq(
            "id",
            oldPlace.id
          )
          .select()
          .single();


      if (
        error
      ) {

        throw error;

      }


      placeRow =
        data;

    }


    /*
      새 사진 선택한 경우
    */

    if (
      temporaryImageFile
    ) {

      await uploadPlaceImage(
        placeRow.id,
        temporaryImageFile
      );


      /*
        기존 사진 삭제
      */

      if (
        editingExistingImage
      ) {

        await deleteImageObject(
          editingExistingImage
        );

      }


      /*
        혹시 기존 사진 여러 장이 있다면 정리
      */

      if (
        editingPlaceIndex !==
        null
      ) {

        const oldPlace =
          getDateData()
            .places[
              currentCategory
            ][
              editingPlaceIndex
            ];


        const otherImages =
          (
            oldPlace.images
            ||
            []
          )
          .filter(
            image =>
              !editingExistingImage
              ||
              image.id !==
              editingExistingImage.id
          );


        for (
          const image of
          otherImages
        ) {

          await deleteImageObject(
            image
          );

        }

      }

    }


    /*
      ★ 저장 후 서버에서 전체 최신 데이터 다시 받기
    */

    await loadServerData();


    closePlaceModal();


    renderPlaceList();

    updateCategoryCounts();

    renderCalendar();


    showSuccessModal(
      "후보 저장 완료!",
      "장소 후보가 저장됐어 ♡"
    );


  } catch (error) {

    console.error(
      "장소 저장 실패:",
      error
    );


    alert(
      "후보 저장 실패\n"
      +
      error.message
    );


  } finally {

    saveButton.disabled =
      false;


    hideLoading();

  }

}

/* =====================================================
   CONFIRM DELETE
===================================================== */

async function confirmDeletePlace() {

  if (
    pendingDeleteIndex ===
    null
  ) {

    return;

  }


  const index =
    pendingDeleteIndex;


  document
    .getElementById(
      "deleteOverlay"
    )
    .classList
    .remove(
      "active"
    );


  pendingDeleteIndex =
    null;


  const place =
    getDateData()
      .places[
        currentCategory
      ][index];


  if (!place) {
    return;
  }


  showLoading(
    "삭제 중..."
  );


  try {

    /*
      Storage 사진 삭제
    */

    for (
      const image of
      place.images || []
    ) {

      const {
        error
      } =
        await db
          .storage
          .from(
            "place-images"
          )
          .remove([
            image.storagePath
          ]);


      if (
        error
      ) {

        console.warn(
          "사진 삭제 실패:",
          error
        );

      }

    }


    /*
      장소 DB 삭제

      place_images 행은
      FK cascade로 같이 삭제
    */

    const {
      error
    } =
      await db
        .from(
          "places"
        )
        .delete()
        .eq(
          "id",
          place.id
        );


    if (
      error
    ) {

      throw error;

    }


    /*
      ★ 삭제 후 서버 최신 데이터 재조회
    */

    await loadServerData();


    renderPlaceList();

    updateCategoryCounts();

    renderCalendar();


    showSuccessModal(
      "삭제 완료",
      "후보가 삭제됐어."
    );


  } catch (error) {

    console.error(
      "삭제 실패:",
      error
    );


    alert(
      "후보 삭제 실패\n"
      +
      error.message
    );


  } finally {

    hideLoading();

  }

}


/* =====================================================
   ESCAPE HTML
===================================================== */

function escapeHtml(
  text
) {

  if (!text) {
    return "";
  }


  return String(text)

    .replaceAll(
      "&",
      "&amp;"
    )

    .replaceAll(
      "<",
      "&lt;"
    )

    .replaceAll(
      ">",
      "&gt;"
    )

    .replaceAll(
      '"',
      "&quot;"
    )

    .replaceAll(
      "'",
      "&#039;"
    );

}
